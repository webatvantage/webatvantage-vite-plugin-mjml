name: Tests

on:
  push:
    branches:
      - main
    paths:
      - '**.js'
      - '**.ts'
      - '.github/workflows/test.yaml'
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    if: ${{ !startsWith(github.event.head_commit.message, 'release:') }}
    runs-on: ${{ matrix.os }}

    env:
      DEBUG: 'vite:mjml*'

    strategy:
      matrix:
        node: [ 20, 22, 24 ]
        os: [ubuntu-latest, windows-latest]

    steps:
      - uses: actions/checkout@v7

      - name: Install pnpm
        uses: pnpm/action-setup@v6.0.9

      - name: Setup node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}
          cache: 'pnpm'

      - name: Install Dependencies
        run: pnpm install

      - name: Lint
        run: pnpm run lint

      - name: Build
        run: pnpm run build

      - name: Test
        run: pnpm run test
