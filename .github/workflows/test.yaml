name: Tests

on:
  push:
    branches:
      - main
    paths:
      - '**.js'
      - '**.ts'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - '.github/workflows/test.yaml'
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  test-node-versions:
    if: ${{ !startsWith(github.event.head_commit.message, 'release:') }}
    runs-on: ${{ matrix.os }}

    env:
      DEBUG: 'vite:mjml*'

    strategy:
      matrix:
        node: [ 20, 22, 24 ]
        os: [ubuntu-latest, windows-latest]

    steps:
      - uses: actions/checkout@v7

      - name: Install pnpm
        uses: pnpm/action-setup@v6.0.9
        with:
          version: '10' # latest pnpm 10.x (runs on the whole matrix)

      - name: Setup node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}
          cache: 'pnpm'

      - name: Install Dependencies
        run: pnpm install

      - name: Lint
        run: pnpm run lint

      - name: Build
        run: pnpm run build

      - name: Test
        run: pnpm run test

  test-vite-versions:
    if: ${{ !startsWith(github.event.head_commit.message, 'release:') }}
    runs-on: ubuntu-latest
    name: vite ${{ matrix.vite }}

    env:
      DEBUG: 'vite:mjml*'

    strategy:
      fail-fast: false
      matrix:
        vite: [ 6, 7, 8 ]

    steps:
      - uses: actions/checkout@v7

      - name: Install pnpm
        uses: pnpm/action-setup@v6.0.9
        with:
          version: '10'

      - name: Setup node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Install Dependencies
        run: pnpm install

      - name: Pin vite ${{ matrix.vite }}
        run: pnpm add -D vite@${{ matrix.vite }}

      - name: Build
        run: pnpm run build

      - name: Test
        run: pnpm run test

  test-mjml-versions:
    if: ${{ !startsWith(github.event.head_commit.message, 'release:') }}
    runs-on: ubuntu-latest
    name: mjml ${{ matrix.mjml }}

    env:
      DEBUG: 'vite:mjml*'

    strategy:
      fail-fast: false
      matrix:
        mjml: [ 4, 5 ]

    steps:
      - uses: actions/checkout@v7

      - name: Install pnpm
        uses: pnpm/action-setup@v6.0.9
        with:
          version: '10'

      - name: Setup node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Install Dependencies
        run: pnpm install

      - name: Pin mjml ${{ matrix.mjml }}
        run: pnpm add mjml@${{ matrix.mjml }} mjml-core@${{ matrix.mjml }}

      - name: Build
        run: pnpm run build

      - name: Test
        run: pnpm run test
