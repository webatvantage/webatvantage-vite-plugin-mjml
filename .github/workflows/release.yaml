name: Release

on:
  # Button-triggered release: pick the bump type and the workflow bumps the
  # version, tags it, publishes to npm and pushes the release commit + tag.
  # You never hand-edit the version, so you can't forget to bump it.
  workflow_dispatch:
    inputs:
      bump:
        description: 'Version bump'
        required: true
        default: patch
        type: choice
        options:
          - patch
          - minor
          - major
  # Legacy path: pushing a v* tag (e.g. via `pnpm run release` locally) still
  # publishes, so existing habits keep working.
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Install pnpm
        uses: pnpm/action-setup@v6.0.9

      - name: Setup node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'pnpm'
          registry-url: 'https://registry.npmjs.org'

      - name: Install Dependencies
        run: pnpm install

      # Below only runs for the button (workflow_dispatch)

      - name: Configure Git
        if: github.event_name == 'workflow_dispatch'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Bump version, commit and tag
        if: github.event_name == 'workflow_dispatch'
        run: 'pnpm exec bumpp ${{ inputs.bump }} --yes --commit "release: v" --tag --no-push'

      # Shared: build then publish

      - name: PNPM build
        run: pnpm run build

      - name: Publish to NPM
        run: pnpm -r publish --access public --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{secrets.NPM_TOKEN}}

      # Push the release commit + tag only after a successful publication, so a
      # failed publication never leaves a dangling tag / version drift.
      - name: Push release commit and tag
        if: github.event_name == 'workflow_dispatch'
        run: git push --follow-tags

      - name: Create GitHub release
        run: npx conventional-github-releaser -p angular
        continue-on-error: true
        env:
          CONVENTIONAL_GITHUB_RELEASER_TOKEN: ${{secrets.GITHUB_TOKEN}}
